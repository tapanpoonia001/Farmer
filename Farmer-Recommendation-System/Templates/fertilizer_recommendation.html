<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fertilizer Recommendation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <h1>Fertilizer Recommendation System</h1>
    <form method="POST" action="{{ url_for('predict_fertilizer') }}">
        <label for="N">Enter the value of Nitrogen (N):</label>
        <input type="number" id="N" name="N" step="any" required>
        <br><br>
        <label for="P">Enter the value of Phosphorus (P):</label>
        <input type="number" id="P" name="P" step="any" required>
        <br><br>
        <label for="K">Enter the value of Potassium (K):</label>
        <input type="number" id="K" name="K" step="any" required>
        <br><br>
        <label for="temperature">Enter the value of Temperature:</label>
        <input type="number" id="temperature" name="temperature" step="any" required>
        <br><br>
        <label for="Moisture">Enter the value of Moisture:</label>
        <input type="number" id="Moisture" name="Moisture" step="any" required>
        <br><br>
        <label for="Carbon">Enter the value of Carbon:</label>
        <input type="number" id="Carbon" name="Carbon" step="any" required>
        <br><br>
        <label for="ph">Enter the value of pH:</label>
        <input type="number" id="ph" name="ph" step="any" required>
        <br><br>
        <label for="rainfall">Enter the value of Rainfall:</label>
        <input type="number" id="rainfall" name="rainfall" step="any" required>
        <br><br>
        <label for="crop">Enter the name of the crop:</label>
        <input type="text" id="crop" name="crop" required>
        <br><br>
        <label for="soil">Enter the value of Soil:</label>
        <input type="number" id="soil" name="soil" step="any" required>
        <br><br>
        <input type="submit" value="Get Fertilizer Recommendation">
    </form>
</body>
</html>
